<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据源测试</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .item { margin: 10px 0; padding: 12px; border-radius: 6px; background: #16213e; }
        .ok { border-left: 4px solid #10b981; }
        .fail { border-left: 4px solid #ef4444; }
        .testing { border-left: 4px solid #f59e0b; }
        pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; max-height: 200px; overflow: auto; }
        h2 { color: #3b82f6; }
        button { padding: 10px 24px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <h1>备选数据源测试</h1>
    <button onclick="runAll()">开始测试</button>
    <div id="results"></div>
<script>
const R = document.getElementById('results');

function log(id, cls, html) {
    let el = document.getElementById(id);
    if (!el) { el = document.createElement('div'); el.id = id; R.appendChild(el); }
    el.className = 'item ' + cls;
    el.innerHTML = html;
}

// ========== 测试1: 东方财富 JSONP ==========
async function testEastmoney() {
    const id = 't-eastmoney';
    log(id, 'testing', '<h2>东方财富 (JSONP)</h2><div>测试中...</div>');
    return new Promise((resolve) => {
        const cb = 'cb_em_' + Date.now();
        window[cb] = (data) => {
            delete window[cb];
            if (data && data.data && data.data.klines && data.data.klines.length > 0) {
                log(id, 'ok', `<h2>东方财富 (JSONP) ✅</h2><div>获取到 ${data.data.klines.length} 条数据</div><pre>${data.data.klines.slice(-3).join('\\n')}</pre>`);
            } else {
                log(id, 'fail', `<h2>东方财富 (JSONP) ❌</h2><div>返回数据为空</div><pre>${JSON.stringify(data).slice(0,500)}</pre>`);
            }
            resolve();
        };
        const s = document.createElement('script');
        s.src = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=1.000001&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&beg=20250101&end=20260320&ut=fa5fd1943c7b386f172d6893dbbd4dc0&cb=${cb}`;
        s.onerror = () => {
            delete window[cb];
            log(id, 'fail', '<h2>东方财富 (JSONP) ❌</h2><div>Script 加载失败</div>');
            resolve();
        };
        setTimeout(() => { if (window[cb]) { delete window[cb]; log(id, 'fail', '<h2>东方财富 (JSONP) ❌</h2><div>超时</div>'); resolve(); } }, 8000);
        document.head.appendChild(s);
    });
}

// ========== 测试2: 腾讯财经 ==========
async function testTencent() {
    const id = 't-tencent';
    log(id, 'testing', '<h2>腾讯财经 (JSONP)</h2><div>测试中...</div>');
    return new Promise((resolve) => {
        const cb = 'v_' + Date.now();
        // 腾讯财经用的是全局变量赋值方式
        const s = document.createElement('script');
        s.src = `https://web.sqt.gtimg.cn/q=sh000001`;
        s.onload = () => {
            // 腾讯财经返回 v_sh000001="..."
            if (typeof v_sh000001 !== 'undefined') {
                log(id, 'ok', `<h2>腾讯财经 ✅</h2><div>实时数据获取成功</div><pre>${v_sh000001}</pre>`);
            } else {
                log(id, 'fail', '<h2>腾讯财经 ❌</h2><div>返回数据格式异常</div>');
            }
            resolve();
        };
        s.onerror = () => {
            log(id, 'fail', '<h2>腾讯财经 ❌</h2><div>Script 加载失败</div>');
            resolve();
        };
        setTimeout(() => resolve(), 8000);
        document.head.appendChild(s);
    });
}

// ========== 测试3: 新浪财经 ==========
async function testSina() {
    const id = 't-sina';
    log(id, 'testing', '<h2>新浪财经</h2><div>测试中...</div>');
    try {
        // 新浪K线接口
        const resp = await fetch('https://quotes.sina.cn/cn/api/jsonp.php/var%20_sh000001=/CN_MarketDataService.getKLineData?symbol=sh000001&scale=240&ma=no&datalen=30');
        if (resp.ok) {
            const text = await resp.text();
            log(id, 'ok', `<h2>新浪财经 ✅</h2><div>数据获取成功</div><pre>${text.slice(0, 500)}</pre>`);
        } else {
            log(id, 'fail', `<h2>新浪财经 ❌</h2><div>HTTP ${resp.status}</div>`);
        }
    } catch (e) {
        // 尝试 JSONP 方式
        return new Promise((resolve) => {
            const s = document.createElement('script');
            s.src = 'https://hq.sinajs.cn/list=sh000001';
            s.onload = () => {
                if (typeof hq_str_sh000001 !== 'undefined') {
                    log(id, 'ok', `<h2>新浪财经 (hq.sinajs) ✅</h2><pre>${hq_str_sh000001}</pre>`);
                } else {
                    log(id, 'fail', `<h2>新浪财经 ❌</h2><div>CORS + JSONP 均失败: ${e.message}</div>`);
                }
                resolve();
            };
            s.onerror = () => {
                log(id, 'fail', `<h2>新浪财经 ❌</h2><div>所有方式均失败: ${e.message}</div>`);
                resolve();
            };
            document.head.appendChild(s);
        });
    }
}

            delete window[cb];
            if (data && data.data && data.data.klines && data.data.klines.length > 0) {
                log(id, 'ok', `<h2>东方财富备用 ✅</h2><div>获取到 ${data.data.klines.length} 条数据</div><pre>${data.data.klines.slice(-3).join('\\n')}</pre>`);
            } else {
                log(id, 'fail', `<h2>东方财富备用 ❌</h2><div>返回数据为空</div>`);
            }
            resolve();
        };
        const s = document.createElement('script');
        s.src = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=0.000001&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&beg=20250101&end=20260320&ut=fa5fd1943c7b386f172d6893dbbd4dc0&cb=${cb}`;
        s.onerror = () => {
            delete window[cb];
            log(id, 'fail', '<h2>东方财富备用 ❌</h2><div>Script 加载失败</div>');
            resolve();
        };
        setTimeout(() => { if (window[cb]) { delete window[cb]; log(id, 'fail', '<h2>东方财富备用 ❌</h2><div>超时</div>'); resolve(); } }, 8000);

// ========== 测试5: AllTick API (免费行情) ==========
async function testAllTick() {
    const id = 't-alltick';
    log(id, 'testing', '<h2>AllTick API</h2><div>测试中...</div>');
    try {
        const resp = await fetch('https://quote.tradeswitcher.com/quote-stock-b-api/kline?token=test&query=%7B%22trace%22%3A%22test%22%2C%22data%22%3A%7B%22code%22%3A%22000001.SH%22%2C%22kline_type%22%3A1%2C%22kline_timestamp_end%22%3A0%2C%22query_kline_num%22%3A30%7D%7D');
        const text = await resp.text();
        log(id, resp.ok ? 'ok' : 'fail', `<h2>AllTick API ${resp.ok ? '✅' : '❌'}</h2><pre>${text.slice(0,500)}</pre>`);
    } catch(e) {
        log(id, 'fail', `<h2>AllTick API ❌</h2><div>${e.message}</div>`);
    }
}

async function runAll() {
    R.innerHTML = '<div style="color:#f59e0b;padding:10px">正在逐个测试各数据源...</div>';
    await testEastmoney();
    await testEastmoneyAlt();
    await testTencent();
    await testSina();
    await testAllTick();
    const summary = document.createElement('div');
    summary.style.cssText = 'margin-top:20px;padding:15px;background:#0f3460;border-radius:8px;';
    summary.innerHTML = '<h2>测试完成</h2><div>请将此页面截图发给我，我来选择最佳方案。</div>';
    R.appendChild(summary);
}
</script>
</body>
</html>
